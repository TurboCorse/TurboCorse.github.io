<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>Sensor Board ADC – 24 Pin Pinout</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
        }

        svg {
            display: block;
            margin-bottom: 40px;
        }

        /* Tabelle */
        table {
            border-collapse: collapse;
            width: 700px;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 8px;
        }

        th {
            background-color: #f0f0f0;
        }

        tr.active {
            background-color: #ffe0b3;
        }

        /* Pins */
        .pin {
            fill: #d0d0d0;
            stroke: #333;
            stroke-width: 1;
            transition: fill 0.2s;
            cursor: pointer;
        }

        .pin.active {
            fill: red;
        }

        .pin-label {
            font-size: 10px;
            text-anchor: middle;
            pointer-events: none;
        }

        .connector-body {
            fill: #444;
        }


        .layout {
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        /* SVG bleibt stehen */
        .svg-wrapper {
            position: sticky;
            top: 40px;
            /* Abstand vom oberen Rand */
        }

        /* Tabelle scrollt */
        .table-wrapper {
            max-height: 400px;
            /* kannst du anpassen */
            overflow-y: auto;
        }

        /* optional: schöner Scroll */
        .table-wrapper::-webkit-scrollbar {
            width: 8px;
        }

        .table-wrapper::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }

        /* =========================
   MOBILE VERSION
   ========================= */
        @media (max-width: 768px) {

            body {
                padding: 16px;
            }

            .layout {
                flex-direction: column;
                gap: 20px;
            }

            /* SVG oben, nicht sticky */
            .svg-wrapper {
                position: relative;
                top: auto;
                display: flex;
                justify-content: center;
            }

            svg {
                width: 100%;
                max-width: 360px;
                height: auto;
            }

            /* Tabelle bekommt eigene Scrollfläche */
            .table-wrapper {
                max-height: 60vh;
                overflow-y: auto;
            }

            table {
                width: 100%;
                font-size: 14px;
            }

            th,
            td {
                padding: 6px;
            }
        }
    </style>
</head>

<body>

    Image of connector frontal view
    <br />
    Labels also inside the connector body
    <div class="layout">
        <div class="svg-wrapper">
            <svg width="400" height="260" viewBox="0 0 400 260">
                <rect x="20" y="20" width="360" height="220" rx="20" class="connector-body" />
                <g id="pinContainer"></g>
            </svg>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Pin</th>
                        <th>Signal</th>
                        <th>Beschreibung</th>
                    </tr>
                </thead>
                <tbody id="pinTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {

            /* =======================================================
               HIER TRÄGST DU DEINE PIN-BESCHREIBUNGEN EIN
               ======================================================= */

            const pinData = {
                A1: { signal: "+12V", desc: "Power supply +12V" },
                A2: { signal: "AIN2", desc: "Analog input 2, internal pullup selectable" },
                A3: { signal: "AIN4", desc: "Analog input 4, internal pullup selectable" },
                A4: { signal: "AIN5", desc: "Analog input 5" },
                A5: { signal: "AIN8", desc: "Analog input 8" },
                A6: { signal: "DIN3", desc: "Digital input 3" },
                A7: { signal: "DOU1", desc: "Digital output 1 max 5A" },
                A8: { signal: "DOU2", desc: "Digital output 2 max 5A" },

                B1: { signal: "GND", desc: "Ground power supply" },
                B2: { signal: "AIN1", desc: "Analog input 1, internal pullup selectable" },
                B3: { signal: "AIN3", desc: "Analog input 3, internal pullup selectable" },
                B4: { signal: "AIN6", desc: "Analog input 6" },
                B5: { signal: "GND", desc: "Ground sensor" },
                B6: { signal: "DIN2", desc: "Digital input 2" },
                B7: { signal: "DOU3", desc: "Digital output 3 max 5A" },
                B8: { signal: "DOU4", desc: "Digital output 4 max 5A" },

                C1: { signal: "+5V", desc: "+5V Output for Sensor supply max 150mA" },
                C2: { signal: "CAN H", desc: "Can bus high" },
                C3: { signal: "CAN L", desc: "Can bus low" },
                C4: { signal: "AIN7", desc: "Analog input 7" },
                C5: { signal: "DIN4", desc: "Digital input 4" },
                C6: { signal: "DIN1", desc: "Digital input 1" },
                C7: { signal: "GND", desc: "Ground digital outputs" },
                C8: { signal: "GND", desc: "Ground digital outputs" }
            };

            /* ======================================================= */

            const rows = ["A", "B", "C"];
            const cols = 8;

            const pinContainer = document.getElementById("pinContainer");
            const tableBody = document.getElementById("pinTableBody");

            const startX = 70;
            const startY = 70;
            const spacingX = 35;
            const spacingY = 55;

            /* -------------------------
               SVG Pins erzeugen
               ------------------------- */
            
            rows.forEach((row, rowIndex) => {
                for (let col = 0; col < cols; col++) {

                    const pinNumber = cols - col; // rechts → links
                    const pinId = row + pinNumber;

                    const x = startX + col * spacingX;
                    const y = startY + rowIndex * spacingY;

                    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    circle.setAttribute("cx", x);
                    circle.setAttribute("cy", y);
                    circle.setAttribute("r", 12);
                    circle.setAttribute("id", pinId);
                    circle.setAttribute("class", "pin");

                    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    text.setAttribute("x", x);
                    text.setAttribute("y", y + 3);
                    text.setAttribute("class", "pin-label");
                    text.textContent = pinId;

                    pinContainer.appendChild(circle);
                    pinContainer.appendChild(text);
                }
            });

            /* -------------------------
               Tabelle sortiert A1–A8,
               dann B1–B8, dann C1–C8
               ------------------------- */

            rows.forEach(row => {
                for (let i = 1; i <= cols; i++) {

                    const pinId = row + i;
                    const data = pinData[pinId] || { signal: "", desc: "" };

                    const tr = document.createElement("tr");
                    tr.dataset.pin = pinId;

                    tr.innerHTML = `
                <td>${pinId}</td>
                <td>${data.signal}</td>
                <td>${data.desc}</td>
            `;

                    tableBody.appendChild(tr);

                    const circle = document.getElementById(pinId);

                    // Hover Tabelle → Pin
                    tr.addEventListener("mouseenter", () => {
                        circle.classList.add("active");
                        tr.classList.add("active");
                    });

                    tr.addEventListener("mouseleave", () => {
                        circle.classList.remove("active");
                        tr.classList.remove("active");
                    });

                    // Hover Pin → Tabelle
                    circle.addEventListener("mouseenter", () => {
                        circle.classList.add("active");
                        tr.classList.add("active");
                    });

                    circle.addEventListener("mouseleave", () => {
                        circle.classList.remove("active");
                        tr.classList.remove("active");
                    });
                    // Tap / Click Pin → Tabelle scrollt
                    circle.addEventListener("click", () => {

                        // Alle Markierungen entfernen
                        document.querySelectorAll(".pin.active").forEach(p => p.classList.remove("active"));
                        document.querySelectorAll("tr.active").forEach(r => r.classList.remove("active"));

                        // Aktiven Pin + Zeile setzen
                        circle.classList.add("active");
                        tr.classList.add("active");

                        // Tabelle zur Zeile scrollen
                        tr.scrollIntoView({
                            behavior: "smooth",
                            block: "center"
                        });
                    });
                }
            });

        });
    </script>

</body>

</html>
